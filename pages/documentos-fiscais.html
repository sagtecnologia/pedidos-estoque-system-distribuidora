<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos Fiscais - Sistema Distribuidora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gray-100">
    <div id="navbar"></div>
    <div id="sidebar-container"></div>

    <main class="lg:ml-64 pt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Cabeçalho -->
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h2 class="text-4xl font-bold text-gray-900">
                        <i class="fas fa-file-invoice mr-3 text-blue-600"></i>Documentos Fiscais
                    </h2>
                    <p class="text-gray-600 mt-2">Gerenciamento de NFC-e e NF-e emitidas</p>
                </div>
            </div>

            <!-- Filtros -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h3 class="text-lg font-bold mb-4 flex items-center">
                    <i class="fas fa-filter mr-2 text-gray-600"></i>Filtros
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tipo</label>
                        <select id="filtro-tipo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="">Todos</option>
                            <option value="NFCE">NFC-e</option>
                            <option value="NFE">NF-e</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                        <select id="filtro-status" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="">Todos</option>
                            <option value="100">Autorizado (100)</option>
                            <option value="135">Cancelado (135)</option>
                            <option value="rejeitado">Rejeitado</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Data/Hora Inicial</label>
                        <input type="datetime-local" id="filtro-data-inicial" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Data/Hora Final</label>
                        <input type="datetime-local" id="filtro-data-final" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="mt-4 flex gap-3">
                    <button onclick="aplicarFiltros()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-search mr-2"></i>Buscar
                    </button>
                    <button onclick="limparFiltros()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
                        <i class="fas fa-eraser mr-2"></i>Limpar
                    </button>
                </div>
            </div>

            <!-- Resumo -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">Total de Notas</p>
                            <p id="total-notas" class="text-3xl font-bold text-gray-900">0</p>
                        </div>
                        <i class="fas fa-file-alt text-4xl text-blue-500"></i>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">Autorizadas</p>
                            <p id="total-autorizadas" class="text-3xl font-bold text-green-600">0</p>
                        </div>
                        <i class="fas fa-check-circle text-4xl text-green-500"></i>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">Canceladas</p>
                            <p id="total-canceladas" class="text-3xl font-bold text-red-600">0</p>
                        </div>
                        <i class="fas fa-ban text-4xl text-red-500"></i>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">Valor Total</p>
                            <p id="valor-total" class="text-2xl font-bold text-blue-600">R$ 0,00</p>
                        </div>
                        <i class="fas fa-dollar-sign text-4xl text-blue-500"></i>
                    </div>
                </div>
            </div>

            <!-- Barra de seleção múltipla -->
            <div id="barra-selecao-docs" class="hidden mb-3 bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 flex flex-wrap items-center gap-3 justify-between">
                <span id="texto-selecao-docs" class="text-sm font-medium text-blue-800">0 nota(s) selecionada(s)</span>
                <div class="flex flex-wrap items-center gap-2">

                    <!-- DANFE split -->
                    <div class="flex items-stretch rounded-lg overflow-hidden border border-purple-400 text-sm">
                        <span class="flex items-center px-2 bg-purple-100 text-purple-700 font-semibold text-xs">
                            <i class="fas fa-print mr-1"></i>DANFE
                        </span>
                        <button onclick="imprimirSelecionadasDocs('separado')" title="Abre uma aba do navegador por nota"
                            class="px-3 py-1.5 bg-purple-600 hover:bg-purple-700 text-white transition">
                            Abas separadas
                        </button>
                        <button onclick="imprimirSelecionadasDocs('zip')" title="Baixa um arquivo ZIP com todos os PDFs"
                            class="px-3 py-1.5 bg-purple-800 hover:bg-purple-900 text-white transition border-l border-purple-500">
                            <i class="fas fa-file-archive mr-1"></i>ZIP único
                        </button>
                    </div>

                    <!-- XML split -->
                    <div class="flex items-stretch rounded-lg overflow-hidden border border-green-400 text-sm">
                        <span class="flex items-center px-2 bg-green-100 text-green-700 font-semibold text-xs">
                            <i class="fas fa-code mr-1"></i>XML
                        </span>
                        <button onclick="baixarXMLSelecionadasDocs('separado')" title="Baixa cada XML em arquivo separado"
                            class="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white transition">
                            Separados
                        </button>
                        <button onclick="baixarXMLSelecionadasDocs('zip')" title="Baixa um arquivo ZIP com todos os XMLs"
                            class="px-3 py-1.5 bg-green-800 hover:bg-green-900 text-white transition border-l border-green-500">
                            <i class="fas fa-file-archive mr-1"></i>ZIP único
                        </button>
                    </div>

                    <!-- Limpar -->
                    <button onclick="desselecionarTodasDocs()"
                        class="flex items-center gap-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm px-3 py-1.5 rounded-lg transition">
                        <i class="fas fa-times"></i> Limpar
                    </button>
                </div>
            </div>

            <!-- Tabela de Documentos -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    <input type="checkbox" id="select-all-docs" onchange="toggleSelectAllDocs(this)" class="w-4 h-4 text-blue-600 rounded" title="Selecionar todos">
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Número/Série</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Chave de Acesso</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data Emissão</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Valor</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-documentos" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="8" class="px-6 py-4 text-center text-gray-500">
                                    <i class="fas fa-spinner fa-spin mr-2"></i>Carregando...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Detalhes -->
    <div id="modal-detalhes" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-4xl shadow-lg rounded-md bg-white">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-2xl font-bold text-gray-900">
                    <i class="fas fa-file-invoice mr-2 text-blue-600"></i>Detalhes do Documento
                </h3>
                <button onclick="fecharModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div id="conteudo-detalhes" class="space-y-4">
                <!-- Conteúdo será preenchido dinamicamente -->
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="fecharModal()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
                    Fechar
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/session-manager.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/services/focus-nfe.js"></script>
    <script src="../js/services/nuvem-fiscal.js"></script>
    <script src="../js/services/fiscal.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/sidebar.js"></script>

    <script>
        let documentos = [];
        let documentosFiltrados = [];

        // ========================================
        // INICIALIZAÇÃO
        // ========================================
        
        document.addEventListener('DOMContentLoaded', async () => {
            // Verificar autenticação
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = '../index.html';
                return;
            }

            // Renderizar navbar e sidebar
            document.getElementById('navbar').innerHTML = createNavbar();
            document.getElementById('sidebar-container').innerHTML = createSidebar();
            await initNavbar();
            await initSidebar();

            await carregarDocumentos();
        });

        // ========================================
        // CARREGAR DOCUMENTOS
        // ========================================
        
        async function carregarDocumentos() {
            try {
                const { data, error } = await supabase
                    .from('documentos_fiscais')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                documentos = data || [];
                documentosFiltrados = documentos;
                
                atualizarResumo();
                renderizarTabela();

            } catch (error) {
                console.error('Erro ao carregar documentos:', error);
                showToastSafe('Erro ao carregar documentos fiscais', 'error');
            }
        }

        // ========================================
        // FILTROS
        // ========================================
        
        function aplicarFiltros() {
            const tipo = document.getElementById('filtro-tipo').value;
            const status = document.getElementById('filtro-status').value;
            const dataInicial = document.getElementById('filtro-data-inicial').value;
            const dataFinal = document.getElementById('filtro-data-final').value;

            documentosFiltrados = documentos.filter(doc => {
                // Filtro tipo
                if (tipo && doc.tipo_documento !== tipo) return false;

                // Filtro status
                if (status === 'rejeitado') {
                    if (doc.status_sefaz === '100' || doc.status_sefaz === '135') return false;
                } else if (status && doc.status_sefaz !== status) {
                    return false;
                }

                // Filtro data inicial
                if (dataInicial) {
                    const dataDoc = new Date(doc.data_emissao).toISOString().split('T')[0];
                    if (dataDoc < dataInicial) return false;
                }

                // Filtro data final
                if (dataFinal) {
                    const dataDoc = new Date(doc.data_emissao).toISOString().split('T')[0];
                    if (dataDoc > dataFinal) return false;
                }

                return true;
            });

            atualizarResumo();
            renderizarTabela();
        }

        function limparFiltros() {
            document.getElementById('filtro-tipo').value = '';
            document.getElementById('filtro-status').value = '';
            document.getElementById('filtro-data-inicial').value = '';
            document.getElementById('filtro-data-final').value = '';
            
            documentosFiltrados = documentos;
            atualizarResumo();
            renderizarTabela();
        }

        // ========================================
        // RESUMO
        // ========================================
        
        function atualizarResumo() {
            const total = documentosFiltrados.length;
            const autorizadas = documentosFiltrados.filter(d => d.status_sefaz === '100').length;
            const canceladas = documentosFiltrados.filter(d => d.status_sefaz === '135').length;
            const valorTotal = documentosFiltrados.reduce((sum, d) => sum + parseFloat(d.valor_total || 0), 0);

            document.getElementById('total-notas').textContent = total;
            document.getElementById('total-autorizadas').textContent = autorizadas;
            document.getElementById('total-canceladas').textContent = canceladas;
            document.getElementById('valor-total').textContent = formatarMoeda(valorTotal);
        }

        // ========================================
        // RENDERIZAR TABELA
        // ========================================
        
        function renderizarTabela() {
            const tbody = document.getElementById('tbody-documentos');

            // Resetar seleção ao re-renderizar
            const selectAll = document.getElementById('select-all-docs');
            if (selectAll) selectAll.checked = false;
            document.getElementById('barra-selecao-docs').classList.add('hidden');
            
            if (documentosFiltrados.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-2"></i>
                            <p>Nenhum documento fiscal encontrado</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = documentosFiltrados.map(doc => {
                const selecionavel = doc.chave_acesso && (doc.status_sefaz === '100' || doc.status_sefaz === '135');
                return `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${selecionavel ? `<input type="checkbox" class="doc-checkbox w-4 h-4 text-blue-600 rounded" onchange="atualizarSelecaoDocs()" data-doc-id="${doc.id}" data-nfce-id="${doc.nfce_id || ''}" data-chave="${doc.chave_acesso || ''}" data-status="${doc.status_sefaz}" data-provider="${doc.api_provider || ''}">` : ''}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 text-xs font-semibold rounded-full ${
                            doc.tipo_documento === 'NFCE' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800'
                        }">
                            ${doc.tipo_documento}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${doc.numero_documento || '-'}</div>
                        <div class="text-xs text-gray-500">Série: ${doc.serie || '-'}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-xs font-mono text-gray-600">
                            ${doc.chave_acesso ? doc.chave_acesso.substring(3, 20) + '...' : 'Sem chave'}
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${formatarData(doc.data_emissao)}</div>
                        <div class="text-xs text-gray-500">${formatarHora(doc.data_emissao)}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${formatarMoeda(doc.valor_total)}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${getStatusBadge(doc.status_sefaz)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <button onclick="verDetalhes('${doc.id}')" class="text-blue-600 hover:text-blue-900 mr-3" title="Ver Detalhes">
                            <i class="fas fa-eye"></i>
                        </button>
                        ${doc.chave_acesso && (doc.status_sefaz === '100' || doc.status_sefaz === '135') ? `
                            <button onclick="baixarXML('${doc.id}')" class="text-green-600 hover:text-green-900 mr-3" title="Baixar XML">
                                <i class="fas fa-download"></i>
                            </button>
                            <button onclick="imprimirDANFE('${doc.id}')" class="text-purple-600 hover:text-purple-900 mr-3" title="Imprimir DANFE">
                                <i class="fas fa-print"></i>
                            </button>
                        ` : ''}
                        ${doc.chave_acesso && doc.status_sefaz === '100' ? `
                            <button onclick="cancelarNota('${doc.id}')" class="text-red-600 hover:text-red-900" title="Cancelar Nota">
                                <i class="fas fa-ban"></i>
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `}).join('');
        }

        // ========================================
        // MULTI-SELECT
        // ========================================

        function toggleSelectAllDocs(checkbox) {
            document.querySelectorAll('.doc-checkbox').forEach(cb => { cb.checked = checkbox.checked; });
            atualizarSelecaoDocs();
        }

        function atualizarSelecaoDocs() {
            const selecionadas = document.querySelectorAll('.doc-checkbox:checked');
            const barra = document.getElementById('barra-selecao-docs');
            const texto = document.getElementById('texto-selecao-docs');
            if (selecionadas.length > 0) {
                barra.classList.remove('hidden');
                texto.textContent = `${selecionadas.length} nota(s) selecionada(s)`;
            } else {
                barra.classList.add('hidden');
            }
        }

        function desselecionarTodasDocs() {
            document.querySelectorAll('.doc-checkbox').forEach(cb => { cb.checked = false; });
            const selectAll = document.getElementById('select-all-docs');
            if (selectAll) selectAll.checked = false;
            document.getElementById('barra-selecao-docs').classList.add('hidden');
        }

        function getSelecionadasDocs() {
            return Array.from(document.querySelectorAll('.doc-checkbox:checked')).map(cb => ({
                docId: cb.dataset.docId,
                nfceId: cb.dataset.nfceId || null,
                chave: cb.dataset.chave,
                status: cb.dataset.status,
                provider: cb.dataset.provider
            }));
        }

        async function imprimirSelecionadasDocs(modo = 'separado') {
            const selecionadas = getSelecionadasDocs();
            if (!selecionadas.length) return;

            if (modo === 'zip') {
                // ── ZIP de PDFs ──────────────────────────────────────────
                if (typeof JSZip === 'undefined') {
                    showToastSafe('JSZip não carregado. Tente novamente.', 'error'); return;
                }
                showToastSafe(`Baixando ${selecionadas.length} PDF(s), aguarde...`, 'info');
                const zip = new JSZip();
                let erros = 0;
                for (const item of selecionadas) {
                    try {
                        const doc = documentos.find(d => d.id === item.docId);
                        if (!doc) continue;
                        let blob;
                        if (item.provider === 'nuvem_fiscal') {
                            const nfceId = item.nfceId || await resolverNfceId(doc);
                            if (nfceId) {
                                blob = item.status === '135'
                                    ? await NuvemFiscal.baixarPDFCancelamento(nfceId)
                                    : await NuvemFiscal.baixarPDF(nfceId);
                            }
                        }
                        if (!blob) {
                            const tipo = doc.tipo_documento === 'NFCE' ? 'nfce' : 'nfe';
                            const url = await FiscalService.baixarDANFE(item.chave, tipo);
                            if (url instanceof Blob) blob = url;
                            else { const r = await fetch(url); blob = await r.blob(); }
                        }
                        const nome = `DANFE-${doc.numero_documento || item.docId}.pdf`;
                        zip.file(nome, blob);
                    } catch (err) {
                        console.error('Erro ao obter PDF', item.docId, err);
                        erros++;
                    }
                }
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                NuvemFiscal._triggerDownload(zipBlob, `DANFE-selecionadas-${Date.now()}.zip`);
                if (erros > 0) showToastSafe(`ZIP gerado com ${selecionadas.length - erros} PDF(s). ${erros} erro(s).`, 'warning');
                else showToastSafe(`ZIP com ${selecionadas.length} DANFE(s) baixado!`, 'success');

            } else {
                // ── Abas separadas ────────────────────────────────────────
                showToastSafe(`Abrindo ${selecionadas.length} DANFE(s) em abas...`, 'info');
                let erros = 0;
                for (const item of selecionadas) {
                    try {
                        const doc = documentos.find(d => d.id === item.docId);
                        if (!doc) continue;
                        let pdfUrl;
                        if (item.provider === 'nuvem_fiscal') {
                            const nfceId = item.nfceId || await resolverNfceId(doc);
                            if (nfceId) {
                                pdfUrl = item.status === '135'
                                    ? await NuvemFiscal.baixarPDFCancelamento(nfceId)
                                    : await NuvemFiscal.baixarPDF(nfceId);
                            }
                        }
                        if (!pdfUrl) {
                            const tipo = doc.tipo_documento === 'NFCE' ? 'nfce' : 'nfe';
                            pdfUrl = await FiscalService.baixarDANFE(item.chave, tipo);
                        }
                        const urlParaAbrir = pdfUrl instanceof Blob ? URL.createObjectURL(pdfUrl) : pdfUrl;
                        window.open(urlParaAbrir, '_blank');
                        await new Promise(r => setTimeout(r, 400));
                    } catch (err) {
                        console.error('Erro ao abrir DANFE', item.docId, err);
                        erros++;
                    }
                }
                if (erros > 0) showToastSafe(`${selecionadas.length - erros} aberto(s), ${erros} erro(s).`, 'warning');
                else showToastSafe(`${selecionadas.length} DANFE(s) aberto(s)!`, 'success');
            }
        }

        async function baixarXMLSelecionadasDocs(modo = 'separado') {
            const selecionadas = getSelecionadasDocs();
            if (!selecionadas.length) return;

            if (modo === 'zip') {
                // ── ZIP de XMLs ───────────────────────────────────────────
                if (typeof JSZip === 'undefined') {
                    showToastSafe('JSZip não carregado. Tente novamente.', 'error'); return;
                }
                showToastSafe(`Baixando ${selecionadas.length} XML(s), aguarde...`, 'info');
                const zip = new JSZip();
                let erros = 0;
                for (const item of selecionadas) {
                    try {
                        const doc = documentos.find(d => d.id === item.docId);
                        if (!doc) continue;
                        let blob;
                        if (item.provider === 'nuvem_fiscal') {
                            const nfceId = item.nfceId || await resolverNfceId(doc);
                            if (nfceId) {
                                blob = item.status === '135'
                                    ? await NuvemFiscal.obterXMLCancelamentoBlob(nfceId)
                                    : await NuvemFiscal.obterXMLBlob(nfceId);
                            } else if (doc.xml_nota || doc.xml_retorno) {
                                blob = new Blob([doc.xml_nota || doc.xml_retorno], { type: 'application/xml' });
                            } else {
                                throw new Error('nfce_id não encontrado');
                            }
                        } else {
                            // Focus NFe: não há endpoint de blob puro disponível; pular no ZIP
                            throw new Error('Provider não suporta ZIP: ' + item.provider);
                        }
                        const prefixo = item.status === '135' ? 'NFCE-CANCEL' : 'NFCE';
                        const nome = `${prefixo}-${doc.numero_documento || item.docId}.xml`;
                        zip.file(nome, blob);
                    } catch (err) {
                        console.error('Erro ao obter XML', item.docId, err);
                        erros++;
                    }
                }
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                NuvemFiscal._triggerDownload(zipBlob, `XML-selecionados-${Date.now()}.zip`);
                if (erros > 0) showToastSafe(`ZIP gerado com ${selecionadas.length - erros} XML(s). ${erros} erro(s).`, 'warning');
                else showToastSafe(`ZIP com ${selecionadas.length} XML(s) baixado!`, 'success');

            } else {
                // ── Arquivos separados ────────────────────────────────────
                showToastSafe(`Baixando ${selecionadas.length} XML(s)...`, 'info');
                let erros = 0;
                for (const item of selecionadas) {
                    try {
                        const doc = documentos.find(d => d.id === item.docId);
                        if (!doc) continue;
                        if (item.provider === 'nuvem_fiscal') {
                            const nfceId = item.nfceId || await resolverNfceId(doc);
                            if (nfceId) {
                                if (item.status === '135') await NuvemFiscal.baixarXMLCancelamento(nfceId);
                                else await NuvemFiscal.baixarXML(nfceId);
                                await new Promise(r => setTimeout(r, 400));
                                continue;
                            }
                            if (doc.xml_nota || doc.xml_retorno) {
                                const blob = new Blob([doc.xml_nota || doc.xml_retorno], { type: 'application/xml' });
                                NuvemFiscal._triggerDownload(blob, `NFCE-${doc.numero_documento || item.docId}.xml`);
                                await new Promise(r => setTimeout(r, 400));
                                continue;
                            }
                            throw new Error('nfce_id não encontrado');
                        }
                        const tipo = doc.tipo_documento === 'NFCE' ? 'nfce' : 'nfe';
                        await FiscalService.baixarXML(item.chave, tipo);
                        await new Promise(r => setTimeout(r, 400));
                    } catch (err) {
                        console.error('Erro ao baixar XML', item.docId, err);
                        erros++;
                    }
                }
                if (erros > 0) showToastSafe(`${selecionadas.length - erros} XML(s) baixado(s), ${erros} erro(s).`, 'warning');
                else showToastSafe(`${selecionadas.length} XML(s) baixado(s)!`, 'success');
            }
        }

        // ========================================
        // STATUS BADGE
        // ========================================
        
        function getStatusBadge(status) {
            if (status === '100') {
                return '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800"><i class="fas fa-check-circle mr-1"></i>Autorizado</span>';
            } else if (status === '135') {
                return '<span class="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800"><i class="fas fa-ban mr-1"></i>Cancelado</span>';
            } else {
                return `<span class="px-2 py-1 text-xs font-semibold rounded-full bg-yellow-100 text-yellow-800"><i class="fas fa-exclamation-triangle mr-1"></i>Status ${status}</span>`;
            }
        }

        // ========================================
        // MODAL DETALHES
        // ========================================

            if (!doc) return;

            const conteudo = document.getElementById('conteudo-detalhes');
            
            conteudo.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-bold text-lg mb-2">${doc.tipo_documento} ${doc.numero_documento}/${doc.serie}</h4>
                        <p class="text-sm text-gray-600">${doc.natureza_operacao || 'Sem descrição'}</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Chave de Acesso</label>
                        <p class="text-sm font-mono bg-gray-100 p-2 rounded break-all">${doc.chave_acesso || 'Sem chave'}</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Protocolo</label>
                        <p class="text-sm font-mono bg-gray-100 p-2 rounded">${doc.protocolo_autorizacao || 'Sem protocolo'}</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Status SEFAZ</label>
                        <p class="text-sm">${getStatusBadge(doc.status_sefaz)} ${doc.status_sefaz}</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Valor Total</label>
                        <p class="text-lg font-bold text-blue-600">${formatarMoeda(doc.valor_total)}</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Emissão</label>
                        <p class="text-sm">${formatarDataHora(doc.data_emissao)}</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Autorização</label>
                        <p class="text-sm">${doc.data_autorizacao ? formatarDataHora(doc.data_autorizacao) : 'Não autorizado'}</p>
                    </div>

                    ${doc.mensagem_sefaz ? `
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mensagem SEFAZ</label>
                        <p class="text-sm bg-yellow-50 p-3 rounded border border-yellow-200">${doc.mensagem_sefaz}</p>
                    </div>
                    ` : ''}

                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tentativas de Emissão</label>
                        <p class="text-sm">${doc.tentativas_emissao || 0} tentativa(s)</p>
                        ${doc.ultima_tentativa ? `<p class="text-xs text-gray-500">Última: ${formatarDataHora(doc.ultima_tentativa)}</p>` : ''}
                    </div>
                </div>
            `;

            document.getElementById('modal-detalhes').classList.remove('hidden');

        function fecharModal() {
            document.getElementById('modal-detalhes').classList.add('hidden');
        }

        // ========================================
        // AÇÕES
        // ========================================
        
        /**
         * Resolver o nfce_id da Nuvem Fiscal a partir do documento
         */
        async function resolverNfceId(doc) {
            // 1. Direto de documentos_fiscais
            if (doc.nfce_id) return doc.nfce_id;
            
            // 2. Via venda_id -> vendas.nfce_id
            if (doc.venda_id) {
                const { data: venda } = await supabase
                    .from('vendas')
                    .select('nfce_id')
                    .eq('id', doc.venda_id)
                    .maybeSingle();
                if (venda?.nfce_id) return venda.nfce_id;
            }
            
            return null;
        }

        async function baixarXML(docId) {
            try {
                const doc = documentos.find(d => d.id === docId);
                if (!doc || !doc.chave_acesso) {
                    showToastSafe('Documento sem chave de acesso', 'error');
                    return;
                }
                if (doc.status_sefaz !== '100' && doc.status_sefaz !== '135') {
                    showToastSafe('Só é possível baixar XML de notas autorizadas ou canceladas!', 'error');
                    return;
                }
                showToastSafe('Baixando XML...', 'info');
                
                try {
                    if (doc.api_provider === 'nuvem_fiscal') {
                        const nfceId = await resolverNfceId(doc);
                        
                        if (nfceId) {
                            if (doc.status_sefaz === '135') {
                                // Nota cancelada: usar endpoint de cancelamento
                                console.log('✅ Baixando XML de cancelamento, nfce_id:', nfceId);
                                await NuvemFiscal.baixarXMLCancelamento(nfceId);
                            } else {
                                // Nota autorizada: usar endpoint da nota
                                console.log('✅ Baixando XML da nota, nfce_id:', nfceId);
                                await NuvemFiscal.baixarXML(nfceId);
                            }
                            showToastSafe('XML baixado com sucesso!', 'success');
                            return;
                        }
                        
                        // Fallback: XML salvo no banco
                        if (doc.xml_nota || doc.xml_retorno) {
                            console.log('✅ Usando XML salvo no banco de dados');
                            const xmlContent = doc.xml_nota || doc.xml_retorno;
                            const blob = new Blob([xmlContent], { type: 'application/xml' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `NFCE-${doc.numero_documento || doc.chave_acesso}.xml`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            showToastSafe('XML baixado com sucesso!', 'success');
                            return;
                        }
                        
                        showToastSafe('nfce_id não encontrado para esta nota.', 'error');
                        return;
                    }
                    
                    // Focus NFe ou outro provider
                    const tipo = doc.tipo_documento === 'NFCE' ? 'nfce' : 'nfe';
                    await FiscalService.baixarXML(doc.chave_acesso, tipo);
                    showToastSafe('XML baixado com sucesso!', 'success');
                } catch (err) {
                    console.error('❌ Erro ao baixar XML:', err);
                    showToastSafe('Erro ao baixar XML: ' + (err.message || err), 'error');
                }
            } catch (error) {
                console.error('Erro ao baixar XML:', error);
                showToastSafe('Erro ao baixar XML: ' + error.message, 'error');
            }
        }

        async function imprimirDANFE(docId) {
            try {
                const doc = documentos.find(d => d.id === docId);
                if (!doc || !doc.chave_acesso) {
                    showToastSafe('Documento sem chave de acesso', 'error');
                    return;
                }
                if (doc.status_sefaz !== '100' && doc.status_sefaz !== '135') {
                    showToastSafe('Só é possível imprimir DANFE de notas autorizadas ou canceladas!', 'error');
                    return;
                }
                showToastSafe('Gerando DANFE...', 'info');
                const tipo = doc.tipo_documento === 'NFCE' ? 'nfce' : 'nfe';
                try {
                    let pdfUrl;
                    
                    if (doc.api_provider === 'nuvem_fiscal') {
                        const nfceId = await resolverNfceId(doc);
                        
                        if (nfceId) {
                            if (doc.status_sefaz === '135') {
                                // Nota cancelada: usar endpoint de cancelamento
                                console.log('✅ Baixando PDF de cancelamento, nfce_id:', nfceId);
                                pdfUrl = await NuvemFiscal.baixarPDFCancelamento(nfceId);
                            } else {
                                // Nota autorizada: PDF normal
                                console.log('✅ Baixando PDF da nota, nfce_id:', nfceId);
                                pdfUrl = await NuvemFiscal.baixarPDF(nfceId);
                            }
                        }
                    }
                    
                    // Fallback: usar FiscalService com chave de acesso
                    if (!pdfUrl) {
                        pdfUrl = await FiscalService.baixarDANFE(doc.chave_acesso, tipo);
                    }
                    
                    // Se for um Blob, converter para URL
                    let urlParaAbrir = pdfUrl;
                    if (pdfUrl instanceof Blob) {
                        console.log('🔄 [DOC-FISCAL] Convertendo Blob para ObjectURL...');
                        urlParaAbrir = URL.createObjectURL(pdfUrl);
                    }
                    
                    console.log('🔗 [DOC-FISCAL] Abrindo URL:', urlParaAbrir.substring(0, 80) + '...');
                    window.open(urlParaAbrir, '_blank');
                    showToastSafe('DANFE gerado!', 'success');
                } catch (err) {
                    showToastSafe('Erro ao gerar DANFE: ' + (err.message || err), 'error');
                }
            } catch (error) {
                console.error('Erro ao gerar DANFE:', error);
                showToastSafe('Erro ao gerar DANFE: ' + error.message, 'error');
            }
        }

        async function cancelarNota(docId) {
            try {
                const doc = documentos.find(d => d.id === docId);
                if (!doc || !doc.chave_acesso) {
                    showToastSafe('Documento sem chave de acesso', 'error');
                    return;
                }
                if (doc.status_sefaz !== '100') {
                    showToastSafe('Só é possível cancelar notas autorizadas!', 'error');
                    return;
                }

                // Verificar prazo de cancelamento (24h para NF-e, 30min para NFC-e)
                const prazo = doc.tipo_documento === 'NFCE' ? 30 : 1440; // minutos
                const dataEmissao = new Date(doc.data_emissao);
                const agora = new Date();
                const diferencaMinutos = (agora - dataEmissao) / 1000 / 60;

                if (diferencaMinutos > prazo) {
                    const prazoTexto = doc.tipo_documento === 'NFCE' ? '30 minutos' : '24 horas';
                    showToastSafe(`⚠️ Prazo para cancelamento expirado! ${doc.tipo_documento} pode ser cancelada em até ${prazoTexto} após a emissão.`, 'error');
                    return;
                }

                // Solicitar justificativa
                const justificativa = prompt('📝 Informe a justificativa do cancelamento:\n\n(mínimo 15 caracteres)');
                
                if (!justificativa) return;
                
                if (justificativa.length < 15) {
                    showToastSafe('A justificativa deve ter no mínimo 15 caracteres', 'error');
                    return;
                }

                if (!confirm(`⚠️ Confirma o cancelamento da ${doc.tipo_documento}?\n\nNúmero: ${doc.numero_documento}\nJustificativa: ${justificativa}`)) {
                    return;
                }

                showToastSafe('Cancelando nota fiscal...', 'info');

                // Cancelar via FiscalService com proteção contra erros de storage
                let resultado;
                try {
                    const tipo = doc.tipo_documento === 'NFCE' ? 'nfce' : 'nfe';
                    resultado = await FiscalService.cancelarDocumento(doc.chave_acesso, justificativa, tipo);
                } catch (erroCompleto) {
                    // Se erro for relacionado a storage, não deixar que bloqueie o cancelamento
                    if (erroCompleto.message?.includes('storage') || erroCompleto.code === 'SecurityError' || erroCompleto.name === 'SecurityError') {
                        console.warn('⚠️ Erro de contexto/storage (ignorado, tentando novamente):', erroCompleto.message);
                        showToastSafe('⚠️ Aviso: Problema de armazenamento local, mas continuando cancelamento...', 'warning');
                        // Tentar segunda vez
                        try {
                            const tipo = doc.tipo_documento === 'NFCE' ? 'nfce' : 'nfe';
                            resultado = await FiscalService.cancelarDocumento(doc.chave_acesso, justificativa, tipo);
                        } catch (erroSegundaTentativa) {
                            // Se ainda falhar, registrar mas deixar tentar atualizar o banco mesmo assim
                            console.error('❌ Erro mesmo após segunda tentativa:', erroSegundaTentativa);
                            resultado = { erro: erroSegundaTentativa, tentouCancelar: true };
                        }
                    } else {
                        throw erroCompleto;
                    }
                }

                console.log('📊 [DocumentosFiscais] Resultado do cancelamento:', resultado);

                // Tratamento de sucesso - pode vir de cancelamento direto, sincronização, ou com aviso
                if (resultado.sucesso === true || resultado.status === 'cancelado' || resultado.status_sefaz === '135') {
                    
                    // Mostrar mensagem apropriada baseada no tipo de sucesso
                    if (resultado.sincronizado === true) {
                        // Sincronização bem-sucedida
                        showToastSafe('✅ ' + resultado.mensagem, 'success');
                    } else if (resultado.aviso === true) {
                        // Sucesso mas com aviso
                        showToastSafe('⚠️ ' + resultado.mensagem, 'warning');
                    } else {
                        // Cancelamento direto bem-sucedido
                        showToastSafe('✅ Nota fiscal cancelada com sucesso!', 'success');
                    }
                    
                    // Atualizar status no banco de dados em qualquer caso
                    try {
                        console.log('📝 Atualizando status no banco para CANCELADA...');
                        
                        // Atualizar tabela documentos_fiscais
                        if (docId) {
                            const { error: erroDocumento } = await supabase
                                .from('documentos_fiscais')
                                .update({
                                    status_sefaz: '135',
                                    mensagem_sefaz: 'Cancelamento autorizado pela SEFAZ'
                                })
                                .eq('id', docId);

                            if (erroDocumento) {
                                console.warn('⚠️ Erro ao atualizar documentos_fiscais:', erroDocumento);
                            } else {
                                console.log('✅ documentos_fiscais atualizado');
                            }
                        }

                        // Atualizar também na tabela vendas se houver venda_id
                        if (doc.venda_id) {
                            try {
                                console.log('🔗 Cancelando venda associada:', doc.venda_id);
                                const resultadoCancelamentoVenda = await FiscalService.cancelarVendaAssociada(doc.venda_id);
                                console.log('✅ Venda cancelada:', resultadoCancelamentoVenda);
                            } catch (erroCancelamentoVenda) {
                                console.warn('⚠️ Erro ao cancelar venda associada:', erroCancelamentoVenda.message);
                                showToastSafe('⚠️ Nota cancelada mas erro ao cancelar venda: ' + erroCancelamentoVenda.message, 'warning');
                            }
                        }
                    } catch (erroUpdate) {
                        console.warn('⚠️ Aviso: Cancelamento foi bem-sucedido mas erro ao atualizar banco:', erroUpdate.message);
                        showToastSafe('⚠️ Cancelamento bem-sucedido mas com erro ao atualizar banco. Recarregando...', 'warning');
                    }
                    
                    // Aguardar um pouco e recarregar lista
                    await new Promise(r => setTimeout(r, 500));
                    await carregarDocumentos();
                    
                } else {
                    throw new Error('Erro ao cancelar nota: ' + (resultado.mensagem_sefaz || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error('❌ Erro ao cancelar nota:', error);
                
                // Detectar se é erro de documento já cancelado
                if (error.message?.includes('já foi CANCELADA') || error.message?.includes('já estava CANCELADO')) {
                    console.log('ℹ️ Documento já estava cancelado, atualizando banco...');
                    showToastSafe('ℹ️ Documento já estava CANCELADO. Status atualizado no banco.', 'info');
                    await new Promise(r => setTimeout(r, 1000));
                    await carregarDocumentos();
                } else {
                    showToastSafe('❌ Erro ao cancelar nota: ' + error.message, 'error');
                }
            }
        }

        // ========================================
        // UTILITÁRIOS
        // ========================================
        
        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor || 0);
        }

        function formatarData(data) {
            if (!data) return '-';
            return new Date(data).toLocaleDateString('pt-BR');
        }

        function formatarHora(data) {
            if (!data) return '-';
            return new Date(data).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function formatarDataHora(data) {
            if (!data) return '-';
            return new Date(data).toLocaleString('pt-BR');
        }

        function showToastSafe(message, type = 'info') {
            // Reutilizar toast do sistema (se existir e não for esta função)
            if (window.showToast && window.showToast !== showToastSafe) {
                window.showToast(message, type);
            } else {
                alert(message);
            }
        }
    </script>
