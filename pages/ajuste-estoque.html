<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuste de Estoque - Sistema de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .row-editando { background-color: #eff6ff !important; }
        .badge-diferenca-pos { background: #dcfce7; color: #16a34a; }
        .badge-diferenca-neg { background: #fee2e2; color: #dc2626; }
        .input-novo-estoque:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="navbar"></div>
    <div id="sidebar-container"></div>

    <main class="lg:ml-64 pt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Header -->
            <div class="mb-6 flex flex-wrap justify-between items-center gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-1">
                        <i class="fas fa-warehouse mr-2 text-blue-600"></i>Ajuste de Estoque
                    </h1>
                    <p class="text-gray-500 text-sm">Informe o novo estoque e o motivo diretamente na linha do produto</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="salvarTodos()" id="btn-salvar-todos" class="hidden bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
                        <i class="fas fa-save"></i> Salvar Todos Pendentes
                    </button>
                    <button onclick="toggleHistorico()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg flex items-center gap-2 text-sm">
                        <i class="fas fa-history"></i> Histórico
                    </button>
                </div>
            </div>

            <!-- Filtros -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-5">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 items-end">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Produto</label>
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                            <input type="text" id="filtro-produto" placeholder="Buscar produto..."
                                   class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-400"
                                   oninput="filtrarProdutos()">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Marca</label>
                        <select id="filtro-marca" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" onchange="filtrarProdutos()">
                            <option value="">Todas as marcas</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Categoria</label>
                        <select id="filtro-categoria" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" onchange="filtrarProdutos()">
                            <option value="">Todas as categorias</option>
                        </select>
                    </div>
                    <div>
                        <button onclick="limparFiltros()" class="w-full px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm flex items-center justify-center gap-2">
                            <i class="fas fa-times-circle"></i> Limpar Filtros
                        </button>
                    </div>
                </div>
                <div class="mt-3 flex items-center gap-3 text-xs text-gray-500">
                    <span id="contador-produtos">–</span>
                    <span>·</span>
                    <span id="contador-pendentes" class="hidden text-amber-600 font-semibold"></span>
                </div>
            </div>

            <!-- Tabela de Produtos -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="px-4 py-3 text-left font-semibold text-gray-600">Produto</th>
                            <th class="px-4 py-3 text-left font-semibold text-gray-600 hidden md:table-cell">Marca / Categoria</th>
                            <th class="px-4 py-3 text-right font-semibold text-gray-600">Estoque Atual</th>
                            <th class="px-4 py-3 text-center font-semibold text-gray-600">Novo Estoque</th>
                            <th class="px-4 py-3 text-center font-semibold text-gray-600 hidden sm:table-cell">Diferença</th>
                            <th class="px-4 py-3 text-center font-semibold text-gray-600">Motivo</th>
                            <th class="px-4 py-3 text-center font-semibold text-gray-600">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="produtos-tbody" class="divide-y divide-gray-50">
                        <tr>
                            <td colspan="7" class="px-6 py-10 text-center text-gray-400">
                                <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>
                                Carregando produtos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Historico (colapsável) -->
            <div id="painel-historico" class="hidden mt-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100">
                        <h2 class="font-bold text-gray-800"><i class="fas fa-history mr-2 text-gray-400"></i>Histórico de Ajustes</h2>
                        <div class="flex gap-2 items-center">
                            <select id="hist-filtro-motivo" class="px-3 py-1.5 border border-gray-200 rounded-lg text-sm" onchange="filtrarHistorico()">
                                <option value="">Todos os motivos</option>
                                <option value="CORRECAO_INVENTARIO">Correção de Inventário</option>
                                <option value="PERDA">Perda</option>
                                <option value="DANO">Dano</option>
                                <option value="ROUBO">Roubo</option>
                                <option value="OUTRO">Outro</option>
                            </select>
                            <input type="date" id="hist-filtro-data" class="px-3 py-1.5 border border-gray-200 rounded-lg text-sm" onchange="filtrarHistorico()">
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr>
                                    <th class="px-4 py-3 text-left font-semibold text-gray-600">Data</th>
                                    <th class="px-4 py-3 text-left font-semibold text-gray-600">Produto</th>
                                    <th class="px-4 py-3 text-right font-semibold text-gray-600">Anterior</th>
                                    <th class="px-4 py-3 text-right font-semibold text-gray-600">Ajuste</th>
                                    <th class="px-4 py-3 text-right font-semibold text-gray-600">Novo</th>
                                    <th class="px-4 py-3 text-left font-semibold text-gray-600">Motivo</th>
                                    <th class="px-4 py-3 text-left font-semibold text-gray-600">Usuário</th>
                                    <th class="px-4 py-3 text-center font-semibold text-gray-600">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="historico-tbody" class="divide-y divide-gray-50">
                                <tr><td colspan="8" class="px-6 py-6 text-center text-gray-400">Carregando histórico...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/session-manager.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/sidebar.js"></script>

    <script>
        const MOTIVOS = {
            'CORRECAO_INVENTARIO': 'Correção de Inventário',
            'PERDA': 'Perda',
            'DANO': 'Dano',
            'ROUBO': 'Roubo',
            'OUTRO': 'Outro'
        };

        let todosProdutos = [];
        let produtosFiltrados = [];
        let todosAjustes = [];
        let historicoFiltrado = [];
        let historicoCarregado = false;
        // Rastreia edições pendentes por produto id
        const pendentes = {};

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                await checkAuth();
                document.getElementById("navbar").innerHTML = createNavbar();
                document.getElementById("sidebar-container").innerHTML = createSidebar();
                await initNavbar();
                await initSidebar();

                await Promise.all([carregarMarcas(), carregarCategorias(), carregarProdutos()]);
            } catch (error) {
                console.error("Erro ao inicializar:", error);
                window.location.href = "/index.html";
            }
        });

        // ── Carregamento de dados ────────────────────────────────────────────
        async function carregarMarcas() {
            const { data } = await supabase.from('marcas').select('id, nome').eq('ativo', true).order('nome');
            const sel = document.getElementById('filtro-marca');
            (data || []).forEach(m => {
                const o = document.createElement('option');
                o.value = m.id;
                o.textContent = m.nome;
                sel.appendChild(o);
            });
        }

        async function carregarCategorias() {
            const { data } = await supabase.from('categorias').select('id, nome').eq('ativo', true).order('nome');
            const sel = document.getElementById('filtro-categoria');
            (data || []).forEach(c => {
                const o = document.createElement('option');
                o.value = c.id;
                o.textContent = c.nome;
                sel.appendChild(o);
            });
        }

        async function carregarProdutos() {
            const { data, error } = await supabase
                .from('produtos')
                .select('id, nome, sku, estoque_atual, marca_id, categoria_id, marca:marcas(nome), categoria:categorias(nome)')
                .eq('ativo', true)
                .order('nome');

            if (error) {
                mostrarToast('Erro ao carregar produtos: ' + error.message, 'error');
                return;
            }

            todosProdutos = data || [];
            produtosFiltrados = todosProdutos;
            atualizarContador();
            renderizarProdutos();
        }

        async function carregarHistorico() {
            const { data, error } = await supabase
                .from('ajuste_estoque')
                .select(`
                    id, produto_id,
                    produto:produtos(nome, sku),
                    quantidade_anterior, quantidade_ajustada, quantidade_diferenca,
                    motivo, observacoes,
                    usuario:users(full_name),
                    data_ajuste
                `)
                .order('data_ajuste', { ascending: false })
                .limit(200);

            if (error) {
                mostrarToast('Erro ao carregar histórico: ' + error.message, 'error');
                return;
            }

            todosAjustes = data || [];
            historicoFiltrado = todosAjustes;
            renderizarHistorico();
        }

        // ── Filtros ──────────────────────────────────────────────────────────
        function filtrarProdutos() {
            const termoProduto = document.getElementById('filtro-produto').value.toLowerCase().trim();
            const marcaId = document.getElementById('filtro-marca').value;
            const categoriaId = document.getElementById('filtro-categoria').value;

            produtosFiltrados = todosProdutos.filter(p => {
                const matchNome = !termoProduto ||
                    p.nome.toLowerCase().includes(termoProduto) ||
                    (p.sku && p.sku.toLowerCase().includes(termoProduto));
                const matchMarca = !marcaId || p.marca_id === marcaId;
                const matchCat = !categoriaId || p.categoria_id === categoriaId;
                return matchNome && matchMarca && matchCat;
            });

            atualizarContador();
            renderizarProdutos();
        }

        function limparFiltros() {
            document.getElementById('filtro-produto').value = '';
            document.getElementById('filtro-marca').value = '';
            document.getElementById('filtro-categoria').value = '';
            filtrarProdutos();
        }

        function filtrarHistorico() {
            const motivo = document.getElementById('hist-filtro-motivo').value;
            const data = document.getElementById('hist-filtro-data').value;

            historicoFiltrado = todosAjustes.filter(a => {
                const matchMotivo = !motivo || a.motivo === motivo;
                const matchData = !data || a.data_ajuste.startsWith(data);
                return matchMotivo && matchData;
            });

            renderizarHistorico();
        }

        function atualizarContador() {
            document.getElementById('contador-produtos').textContent =
                `${produtosFiltrados.length} produto${produtosFiltrados.length !== 1 ? 's' : ''} exibido${produtosFiltrados.length !== 1 ? 's' : ''}`;
            atualizarContadorPendentes();
        }

        function atualizarContadorPendentes() {
            const qtd = Object.keys(pendentes).length;
            const el = document.getElementById('contador-pendentes');
            const btn = document.getElementById('btn-salvar-todos');
            if (qtd > 0) {
                el.textContent = `${qtd} ajuste${qtd !== 1 ? 's' : ''} pendente${qtd !== 1 ? 's' : ''}`;
                el.classList.remove('hidden');
                btn.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
                btn.classList.add('hidden');
            }
        }

        // ── Renderização da tabela de produtos ───────────────────────────────
        function renderizarProdutos() {
            const tbody = document.getElementById('produtos-tbody');

            if (produtosFiltrados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-gray-400">
                    <i class="fas fa-box-open text-3xl mb-2 block"></i>Nenhum produto encontrado</td></tr>`;
                return;
            }

            tbody.innerHTML = produtosFiltrados.map(p => {
                const estoqueAtual = p.estoque_atual ?? 0;
                const pendente = pendentes[p.id];
                const novoValor = pendente ? pendente.novoEstoque : '';
                const motivoValor = pendente ? pendente.motivo : '';
                const rowClass = pendente ? 'row-editando' : 'hover:bg-gray-50';

                // Badge de diferença para linhas com valor preenchido
                let badgeDif = '';
                if (pendente) {
                    const dif = pendente.novoEstoque - estoqueAtual;
                    const cls = dif >= 0 ? 'badge-diferenca-pos' : 'badge-diferenca-neg';
                    const sinal = dif > 0 ? '+' : '';
                    badgeDif = `<span class="px-2 py-0.5 rounded-full text-xs font-bold ${cls}">${sinal}${dif.toFixed(2)}</span>`;
                }

                const marcaNome = p.marca?.nome || '–';
                const catNome = p.categoria?.nome || '–';

                return `
                <tr data-id="${p.id}" class="${rowClass} transition-colors">
                    <td class="px-4 py-3">
                        <div class="font-medium text-gray-900">${escapeHtml(p.nome)}</div>
                        <div class="text-xs text-gray-400">${p.sku || ''}</div>
                    </td>
                    <td class="px-4 py-3 hidden md:table-cell">
                        <div class="text-gray-700">${escapeHtml(marcaNome)}</div>
                        <div class="text-xs text-gray-400">${escapeHtml(catNome)}</div>
                    </td>
                    <td class="px-4 py-3 text-right font-semibold text-gray-800">${estoqueAtual.toFixed(2)}</td>
                    <td class="px-4 py-3 text-center">
                        <input type="number" step="0.01" min="0"
                               class="input-novo-estoque w-28 px-2 py-1.5 border border-gray-200 rounded-lg text-sm text-right transition"
                               placeholder="${estoqueAtual.toFixed(2)}"
                               value="${novoValor}"
                               oninput="onNovoEstoqueChange(this, '${p.id}', ${estoqueAtual})">
                    </td>
                    <td class="px-4 py-3 text-center hidden sm:table-cell">
                        <span id="dif-${p.id}">${badgeDif}</span>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <select class="w-40 px-2 py-1.5 border border-gray-200 rounded-lg text-sm"
                                onchange="onMotivoChange(this, '${p.id}')">
                            <option value="">Motivo...</option>
                            ${Object.entries(MOTIVOS).map(([v, l]) =>
                                `<option value="${v}" ${motivoValor === v ? 'selected' : ''}>${l}</option>`
                            ).join('')}
                        </select>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="salvarLinha('${p.id}', ${estoqueAtual})"
                                id="btn-${p.id}"
                                class="${pendente ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-gray-100 text-gray-400 cursor-default'} px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1 mx-auto"
                                ${pendente ? '' : 'disabled'}>
                            <i class="fas fa-check text-xs"></i> Salvar
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Eventos inline de edição ─────────────────────────────────────────
        function onNovoEstoqueChange(input, produtoId, estoqueAtual) {
            const val = input.value.trim();
            const motivo = obterMotivoLinha(produtoId);

            atualizarDiferenca(produtoId, estoqueAtual, val);

            if (val === '' || val === null) {
                delete pendentes[produtoId];
            } else {
                if (!pendentes[produtoId]) pendentes[produtoId] = {};
                pendentes[produtoId].novoEstoque = parseFloat(val);
                pendentes[produtoId].motivo = motivo;
            }

            atualizarBotaoLinha(produtoId);
            atualizarContadorPendentes();
        }

        function onMotivoChange(select, produtoId) {
            if (pendentes[produtoId]) {
                pendentes[produtoId].motivo = select.value;
            }
            atualizarBotaoLinha(produtoId);
        }

        function obterMotivoLinha(produtoId) {
            const row = document.querySelector(`tr[data-id="${produtoId}"]`);
            if (!row) return '';
            const sel = row.querySelector('select');
            return sel ? sel.value : '';
        }

        function atualizarDiferenca(produtoId, estoqueAtual, novoValor) {
            const el = document.getElementById(`dif-${produtoId}`);
            if (!el) return;
            if (novoValor === '' || novoValor === null) {
                el.innerHTML = '';
                return;
            }
            const dif = parseFloat(novoValor) - estoqueAtual;
            const cls = dif >= 0 ? 'badge-diferenca-pos' : 'badge-diferenca-neg';
            const sinal = dif > 0 ? '+' : '';
            el.innerHTML = `<span class="px-2 py-0.5 rounded-full text-xs font-bold ${cls}">${sinal}${dif.toFixed(2)}</span>`;
        }

        function atualizarBotaoLinha(produtoId) {
            const btn = document.getElementById(`btn-${produtoId}`);
            if (!btn) return;
            const p = pendentes[produtoId];
            const ativo = p && p.novoEstoque !== undefined && p.motivo;
            btn.disabled = !ativo;
            if (ativo) {
                btn.className = 'bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1 mx-auto';
            } else {
                btn.className = 'bg-gray-100 text-gray-400 cursor-default px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1 mx-auto';
            }
        }

        // ── Salvar ajuste de uma linha ────────────────────────────────────────
        async function salvarLinha(produtoId, estoqueAtual) {
            const row = document.querySelector(`tr[data-id="${produtoId}"]`);
            const inputNovo = row ? row.querySelector('input[type=number]') : null;
            const selectMotivo = row ? row.querySelector('select') : null;

            const novoEstoque = inputNovo ? parseFloat(inputNovo.value) : NaN;
            const motivo = selectMotivo ? selectMotivo.value : '';

            if (isNaN(novoEstoque) || novoEstoque < 0) {
                mostrarToast('Informe um valor de estoque válido.', 'warning');
                return;
            }
            if (!motivo) {
                mostrarToast('Selecione um motivo para o ajuste.', 'warning');
                return;
            }

            const btn = document.getElementById(`btn-${produtoId}`);
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i>'; }

            try {
                const { data: { user } } = await supabase.auth.getUser();
                const diferenca = novoEstoque - estoqueAtual;

                const { error: errAjuste } = await supabase.from('ajuste_estoque').insert([{
                    produto_id: produtoId,
                    quantidade_anterior: estoqueAtual,
                    quantidade_ajustada: novoEstoque,
                    quantidade_diferenca: diferenca,
                    motivo,
                    usuario_id: user.id
                }]);
                if (errAjuste) throw errAjuste;

                const { error: errUpdate } = await supabase.from('produtos')
                    .update({ estoque_atual: novoEstoque })
                    .eq('id', produtoId);
                if (errUpdate) throw errUpdate;

                // Atualizar produto local
                const idx = todosProdutos.findIndex(p => p.id === produtoId);
                if (idx !== -1) todosProdutos[idx].estoque_atual = novoEstoque;

                delete pendentes[produtoId];
                mostrarToast('Ajuste salvo!', 'success');

                // Recarregar só a linha
                renderizarProdutos();
                atualizarContadorPendentes();

                if (historicoCarregado) await carregarHistorico();
            } catch (error) {
                console.error('Erro ao salvar ajuste:', error);
                mostrarToast('Erro ao salvar: ' + error.message, 'error');
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check text-xs"></i> Salvar';
                }
            }
        }

        // ── Salvar todos os pendentes ─────────────────────────────────────────
        async function salvarTodos() {
            const ids = Object.keys(pendentes);
            if (ids.length === 0) return;

            const btn = document.getElementById('btn-salvar-todos');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

            for (const produtoId of ids) {
                const prod = todosProdutos.find(p => p.id === produtoId);
                if (!prod) continue;
                await salvarLinha(produtoId, prod.estoque_atual);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Salvar Todos Pendentes';
        }

        // ── Histórico ─────────────────────────────────────────────────────────
        function toggleHistorico() {
            const painel = document.getElementById('painel-historico');
            const oculto = painel.classList.toggle('hidden');
            if (!oculto && !historicoCarregado) {
                historicoCarregado = true;
                carregarHistorico();
            }
        }

        function renderizarHistorico() {
            const tbody = document.getElementById('historico-tbody');
            if (historicoFiltrado.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-6 text-center text-gray-400">Nenhum ajuste encontrado</td></tr>';
                return;
            }

            tbody.innerHTML = historicoFiltrado.map(a => {
                const dt = new Date(a.data_ajuste);
                const data = dt.toLocaleDateString('pt-BR');
                const hora = dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const dif = a.quantidade_diferenca;
                const corDif = dif > 0 ? 'text-green-600' : dif < 0 ? 'text-red-600' : 'text-gray-600';
                const sinal = dif > 0 ? '+' : '';
                return `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-gray-700">${data}<br><span class="text-xs text-gray-400">${hora}</span></td>
                    <td class="px-4 py-3">
                        <div class="font-medium text-gray-900">${escapeHtml(a.produto?.nome || '')}</div>
                        <div class="text-xs text-gray-400">${a.produto?.sku || ''}</div>
                    </td>
                    <td class="px-4 py-3 text-right">${(a.quantidade_anterior ?? 0).toFixed(2)}</td>
                    <td class="px-4 py-3 text-right font-bold ${corDif}">${sinal}${Math.abs(dif).toFixed(2)}</td>
                    <td class="px-4 py-3 text-right">${(a.quantidade_ajustada ?? 0).toFixed(2)}</td>
                    <td class="px-4 py-3">${MOTIVOS[a.motivo] || a.motivo}</td>
                    <td class="px-4 py-3 text-gray-500">${a.usuario?.full_name || 'Sistema'}</td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="excluirAjuste('${a.id}')" class="text-red-500 hover:text-red-700 p-1">
                            <i class="fas fa-trash text-xs"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function excluirAjuste(ajusteId) {
            if (!confirm("Deseja excluir este ajuste? O estoque será revertido.")) return;

            try {
                const { data: ajustes, error: errSelect } = await supabase
                    .from('ajuste_estoque').select('*').eq('id', ajusteId).limit(1);
                if (errSelect) throw errSelect;

                const ajuste = ajustes?.[0];
                if (!ajuste) throw new Error("Ajuste não encontrado");

                const estoqueAnterior = ajuste.quantidade_anterior !== null
                    ? ajuste.quantidade_anterior
                    : (ajuste.quantidade_ajustada - ajuste.quantidade_diferenca);

                const { error: errUpdate } = await supabase.from('produtos')
                    .update({ estoque_atual: estoqueAnterior, updated_at: new Date().toISOString() })
                    .eq('id', ajuste.produto_id);
                if (errUpdate) throw errUpdate;

                const { error: errDelete } = await supabase.from('ajuste_estoque').delete().eq('id', ajusteId);
                if (errDelete) throw errDelete;

                // Atualizar produto local
                const idx = todosProdutos.findIndex(p => p.id === ajuste.produto_id);
                if (idx !== -1) todosProdutos[idx].estoque_atual = estoqueAnterior;

                mostrarToast("Ajuste revertido com sucesso!", "success");
                await carregarHistorico();
                renderizarProdutos();
            } catch (error) {
                console.error("Erro ao excluir ajuste:", error);
                mostrarToast("Erro ao excluir: " + error.message, "error");
            }
        }

        function mostrarToast(mensagem, tipo) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-4 py-3 rounded-lg text-white font-medium z-50 shadow-lg text-sm ${
                tipo === 'success' ? 'bg-green-600' :
                tipo === 'error' ? 'bg-red-600' :
                'bg-yellow-500'
            }`;
            toast.textContent = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
