<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - Sistema de Compras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-gray-100">
    <div id="navbar"></div>
    <div id="sidebar-container"></div>

    <main class="lg:ml-64 pt-16">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-gray-900">
                        <i class="fas fa-shopping-cart mr-3 text-green-600"></i>Vendas
                    </h2>
                    <p class="text-gray-600 mt-1">Gerenciamento de vendas</p>
                </div>
                <button onclick="novaVenda()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition">
                    + Nova Venda
                </button>
            </div>

            <!-- Filtros -->
            <div class="bg-white rounded-lg shadow p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-8 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                        <select id="filter-status" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="loadVendas()">
                            <option value="">Todos os status</option>
                            <option value="RASCUNHO">Rascunho</option>
                            <option value="ENVIADO">Enviado</option>
                            <option value="APROVADO">Aprovado</option>
                            <option value="REJEITADO">Rejeitado</option>
                            <option value="FINALIZADO">Finalizado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Cliente</label>
                        <select id="filter-cliente" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="loadVendas()">
                            <option value="">Todos os clientes</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Categoria</label>
                        <select id="filter-categoria" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="loadVendas()">
                            <option value="">Todas as categorias</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Marca</label>
                        <select id="filter-marca" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="loadVendas()">
                            <option value="">Todas as marcas</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Número</label>
                        <input type="text" id="search" placeholder="Buscar número..." class="w-full px-4 py-2 border border-gray-300 rounded-lg" onkeyup="loadVendas()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Data Início</label>
                        <input type="datetime-local" id="filter-data-inicio" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="loadVendas()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Data Fim</label>
                        <input type="datetime-local" id="filter-data-fim" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="loadVendas()">
                    </div>
                    <div class="flex items-end">
                        <button onclick="limparFiltros()" class="w-full bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">Limpar</button>
                    </div>
                </div>
            </div>

            <!-- Tabela -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <!-- Barra de ações em massa -->
                <div id="barra-selecao" class="hidden px-6 py-3 bg-indigo-50 border-b border-indigo-200 flex items-center gap-4">
                    <span class="text-sm font-medium text-indigo-800"><span id="qtd-selecionadas">0</span> nota(s) selecionada(s)</span>
                    <button onclick="imprimirSelecionadas()" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">
                        <i class="fas fa-print"></i> Imprimir todas
                    </button>
                    <button onclick="baixarXMLSelecionadas()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700">
                        <i class="fas fa-file-code"></i> Baixar XMLs
                    </button>
                    <button onclick="desselecionarTodas()" class="flex items-center gap-2 px-4 py-2 bg-gray-200 text-gray-700 text-sm rounded-lg hover:bg-gray-300">
                        <i class="fas fa-times"></i> Limpar seleção
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left">
                                    <input type="checkbox" id="select-all-cb" onchange="toggleSelectAll(this.checked)" class="w-4 h-4 text-indigo-600 rounded cursor-pointer" title="Selecionar todas com NFC-e">
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Número</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Vendedor</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Cliente</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Qtd</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pagamento</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">NFC-e</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Chave Acesso</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Situação Fiscal</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Data</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="vendas-tbody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="13" class="px-6 py-4 text-center text-gray-500">Carregando...</td></tr>
                        </tbody>
                        <tfoot id="vendas-tfoot" class="bg-gray-50 border-t-2 border-gray-300">
                            <tr>
                                <td></td>
                                <td colspan="3" class="px-6 py-4 text-sm font-semibold text-gray-900 text-right">TOTAL:</td>
                                <td class="px-6 py-4 text-sm font-bold text-gray-900" id="total-quantidade">0</td>
                                <td class="px-6 py-4 text-sm font-bold text-gray-900" id="total-valor">R$ 0,00</td>
                                <td colspan="7"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Nova Venda -->
    <div id="modal-nova-venda" class="modal-backdrop hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4">
            <div class="flex justify-between items-center px-6 py-4 border-b">
                <h3 class="text-lg font-semibold text-gray-900">Nova Venda</h3>
                <button onclick="closeModal('modal-nova-venda')" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="form-nova-venda" class="px-6 py-4">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Cliente*</label>
                        <select id="venda-cliente" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <option value="">Selecione um cliente...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Observações</label>
                        <textarea id="venda-observacoes" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Informações sobre a entrega, forma de pagamento, etc..."></textarea>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="closeModal('modal-nova-venda')" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Criar Venda</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg"><div class="spinner mx-auto"></div><p class="mt-4 text-gray-700">Carregando...</p></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/session-manager.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/services/servico-fiscal.js"></script>
    <script src="../js/services/focus-nfe.js"></script>
    <script src="../js/services/nuvem-fiscal.js"></script>
    <script src="../js/services/fiscal.js"></script>
    <script src="../js/services/pedidos.js"></script>
    <script src="../js/services/clientes.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/sidebar.js"></script>
    <script src="../components/modal.js"></script>
    
    <script>
        let currentUser = null;

        (async () => {
            try {
                await checkAuth();
                currentUser = await getCurrentUser();
                document.getElementById('navbar').innerHTML = createNavbar();
                document.getElementById('sidebar-container').innerHTML = createSidebar();
                await initNavbar();
                await initSidebar();
            } catch (error) {
                console.error('Erro ao inicializar vendas:', error);
                document.getElementById('navbar').innerHTML = createNavbar();
                document.getElementById('sidebar-container').innerHTML = createSidebar();
            }
            
            // Definir data padrão (dia atual) em formato datetime-local YYYY-MM-DDTHH:mm
            const hoje = new Date();
            const hojeInicio = new Date(hoje);
            const hojeFim = new Date(hoje);
            hojeInicio.setHours(0, 0, 0, 0);   // 00:00 do dia de hoje
            hojeFim.setHours(23, 59, 0, 0);     // 23:59 do dia de hoje
            
            // Formatar para datetime-local com timezone Brasília
            const formatarDateTimeLocal = (d) => {
                const formatter = new Intl.DateTimeFormat('pt-BR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZone: 'America/Sao_Paulo',
                    hour12: false
                });
                const parts = formatter.formatToParts(d);
                const year = parts.find(p => p.type === 'year').value;
                const month = parts.find(p => p.type === 'month').value;
                const day = parts.find(p => p.type === 'day').value;
                const hour = parts.find(p => p.type === 'hour').value;
                const minute = parts.find(p => p.type === 'minute').value;
                return `${year}-${month}-${day}T${hour}:${minute}`;
            };
            
            document.getElementById('filter-data-inicio').value = formatarDateTimeLocal(hojeInicio);
            document.getElementById('filter-data-fim').value = formatarDateTimeLocal(hojeFim);
            
            await loadClientesSelect();
            await loadCategoriasSelect();
            await loadMarcasSelect();
            await loadVendas();
        })();

        // Carregar clientes no select
        async function loadClientesSelect() {
            try {
                showLoading(true);
                const clientes = await getClientes();
                
                // Select do modal
                const select = document.getElementById('venda-cliente');
                select.innerHTML = '<option value="">Selecione um cliente...</option>';
                clientes.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.id;
                    option.textContent = `${c.nome}${c.cpf_cnpj ? ' - ' + c.cpf_cnpj : ''}`;
                    select.appendChild(option);
                });
                
                // Select do filtro
                const filterSelect = document.getElementById('filter-cliente');
                filterSelect.innerHTML = '<option value="">Todos os clientes</option>';
                clientes.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.id;
                    option.textContent = c.nome;
                    filterSelect.appendChild(option);
                });
            } finally {
                showLoading(false);
            }
        }

        // Carregar categorias no select
        async function loadCategoriasSelect() {
            try {
                const { data: categorias } = await supabase
                    .from('categorias')
                    .select('id, nome')
                    .order('nome');
                
                const select = document.getElementById('filter-categoria');
                select.innerHTML = '<option value="">Todas as categorias</option>';
                (categorias || []).forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.id;
                    option.textContent = c.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar categorias:', error);
            }
        }

        // Carregar marcas no select
        async function loadMarcasSelect() {
            try {
                const { data: marcas } = await supabase
                    .from('marcas')
                    .select('id, nome')
                    .order('nome');
                
                const select = document.getElementById('filter-marca');
                select.innerHTML = '<option value="">Todas as marcas</option>';
                (marcas || []).forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.id;
                    option.textContent = m.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar marcas:', error);
            }
        }

        // Carregar vendas
        async function loadVendas() {
            const status = document.getElementById('filter-status').value;
            const search = document.getElementById('search').value;
            const clienteId = document.getElementById('filter-cliente').value;
            const categoriaId = document.getElementById('filter-categoria').value;
            const marcaId = document.getElementById('filter-marca').value;
            const dataInicio = document.getElementById('filter-data-inicio').value;
            const dataFim = document.getElementById('filter-data-fim').value;
            
            showLoading(true);
            
            try {
                // 1️⃣ Carregar todas as vendas com filtros
                let query = supabase
                    .from('vendas')
                    .select('*');
                
                if (status) {
                    query = query.eq('status', status);
                }
                
                if (clienteId) {
                    query = query.eq('cliente_id', clienteId);
                }
                
                if (search) {
                    query = query.ilike('numero', `%${search}%`);
                }
                
                if (dataInicio) {
                    // Converter datetime-local para ISO (Supabase espera ISO 8601)
                    const dataInicioObj = new Date(dataInicio);
                    query = query.gte('created_at', dataInicioObj.toISOString());
                }
                
                if (dataFim) {
                    // Converter datetime-local para ISO e adicionar até o final do minuto
                    const dataFimObj = new Date(dataFim);
                    dataFimObj.setSeconds(59);
                    query = query.lte('created_at', dataFimObj.toISOString());
                }
                
                let { data: vendas, error } = await query.order('created_at', { ascending: false }).limit(500);
                
                if (error) throw error;
                
                if (!vendas || vendas.length === 0) {
                    renderVendas([]);
                    return;
                }
                
                console.log(`📊 Vendas carregadas: ${vendas.length}`);
                
                // 2️⃣ Se houver filtros de categoria ou marca, fazer filtragem por produtos
                if (categoriaId || marcaId) {
                    const vendaIds = vendas.map(v => v.id);
                    
                    // Buscar todos os itens destas vendas
                    const { data: todosItens } = await supabase
                        .from('venda_itens')
                        .select('venda_id, produto_id')
                        .in('venda_id', vendaIds);
                    
                    if (!todosItens || todosItens.length === 0) {
                        renderVendas([]);
                        return;
                    }
                    
                    const produtoIds = [...new Set(todosItens.map(i => i.produto_id).filter(Boolean))];
                    
                    // Buscar produtos com categoria e marca
                    let produtosQuery = supabase
                        .from('produtos')
                        .select('id, categoria_id, marca_id');
                    
                    if (produtoIds.length > 0) {
                        produtosQuery = produtosQuery.in('id', produtoIds);
                    }
                    
                    const { data: produtos } = await produtosQuery;
                    
                    // Filtrar produtos por categoria e marca
                    const produtosValidos = new Set();
                    (produtos || []).forEach(p => {
                        const passaCategoriaFiltro = !categoriaId || p.categoria_id === categoriaId;
                        const passaMarcaFiltro = !marcaId || p.marca_id === marcaId;
                        
                        if (passaCategoriaFiltro && passaMarcaFiltro) {
                            produtosValidos.add(p.id);
                        }
                    });
                    
                    // Filtrar vendas que têm itens com produtos válidos
                    const vendasComProdutosValidos = new Set();
                    (todosItens || []).forEach(item => {
                        if (produtosValidos.has(item.produto_id)) {
                            vendasComProdutosValidos.add(item.venda_id);
                        }
                    });
                    
                    // Manter só as vendas que têm produtos válidos
                    vendas = vendas.filter(v => vendasComProdutosValidos.has(v.id));
                    
                    if (vendas.length === 0) {
                        renderVendas([]);
                        return;
                    }
                }
                
                // 3️⃣ Batch load clientes
                const clienteIds = [...new Set(vendas.map(v => v.cliente_id).filter(Boolean))];
                const { data: clientes } = clienteIds.length > 0 
                    ? await supabase
                        .from('clientes')
                        .select('id, nome')
                        .in('id', clienteIds)
                    : { data: [] };
                const clientesMap = Object.fromEntries((clientes || []).map(c => [c.id, c]));
                
                // 4️⃣ Batch load operadores (users)
                const vendedorIds = [...new Set(vendas.map(v => v.vendedor_id).filter(Boolean))];
                const { data: operadores } = vendedorIds.length > 0
                    ? await supabase
                        .from('users')
                        .select('id, full_name')
                        .in('id', vendedorIds)
                    : { data: [] };
                const operadoresMap = Object.fromEntries((operadores || []).map(o => [o.id, o]));
                
                // 5️⃣ Batch load venda_itens
                const vendaIds = vendas.map(v => v.id);
                const { data: itensVendas } = await supabase
                    .from('venda_itens')
                    .select('venda_id, quantidade')
                    .in('venda_id', vendaIds);
                
                // Agrupar itens por venda
                const itensMap = {};
                (itensVendas || []).forEach(item => {
                    if (!itensMap[item.venda_id]) {
                        itensMap[item.venda_id] = [];
                    }
                    itensMap[item.venda_id].push(item);
                });
                
                // 6️⃣ Montar relacionamentos em JavaScript
                vendas.forEach(venda => {
                    venda.cliente = clientesMap[venda.cliente_id] || null;
                    venda.operador = operadoresMap[venda.vendedor_id] || null;
                    venda.venda_itens = itensMap[venda.id] || [];
                });
                
                console.log(`✅ Dados carregados e montados: ${vendas.length} vendas com relacionamentos`);
                renderVendas(vendas);
            } catch (error) {
                handleError(error, 'Erro ao carregar vendas');
            } finally {
                showLoading(false);
            }
        }
        
        // Limpar filtros
        function limparFiltros() {
            const hoje = new Date();
            const hojeInicio = new Date(hoje);
            const hojeFim = new Date(hoje);
            hojeInicio.setHours(0, 0, 0, 0);
            hojeFim.setHours(23, 59, 0, 0);

            const formatarDateTimeLocal = (d) => {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const hours = String(d.getHours()).padStart(2, '0');
                const minutes = String(d.getMinutes()).padStart(2, '0');
                return `${year}-${month}-${day}T${hours}:${minutes}`;
            };

            document.getElementById('filter-status').value = '';
            document.getElementById('filter-cliente').value = '';
            document.getElementById('filter-categoria').value = '';
            document.getElementById('filter-marca').value = '';
            document.getElementById('search').value = '';
            document.getElementById('filter-data-inicio').value = formatarDateTimeLocal(hojeInicio);
            document.getElementById('filter-data-fim').value = formatarDateTimeLocal(hojeFim);
            loadVendas();
        }

        // Renderizar vendas
        function renderVendas(vendas) {
            const tbody = document.getElementById('vendas-tbody');
            
            if (vendas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="13" class="px-6 py-4 text-center text-gray-500">Nenhuma venda encontrada</td></tr>';
                document.getElementById('total-quantidade').textContent = '0';
                document.getElementById('total-valor').textContent = 'R$ 0,00';
                document.getElementById('barra-selecao').classList.add('hidden');
                return;
            }

            let somaQuantidade = 0;
            let somaValor = 0;

            tbody.innerHTML = vendas.map(venda => {
                // Calcular quantidade total de itens
                const quantidadeTotal = (venda.venda_itens || []).reduce((sum, item) => sum + (item.quantidade || 0), 0);
                
                // Verificar se tem nota fiscal emitida (usando nomes corretos dos campos)
                const temNotaFiscal = Boolean(
                    venda.numero_nfce || 
                    venda.chave_acesso_nfce || 
                    venda.status_fiscal === 'EMITIDA_NFCE'
                );
                const statusVenda = (venda.status || '').toUpperCase();
                const vendaFinalizada = statusVenda === 'FINALIZADA' || statusVenda === 'FINALIZADO';
                
                // Debug: Log dos dados fiscais - SEMPRE para vendas finalizadas
                if (vendaFinalizada) {
                    console.log(`[DEBUG] Venda ${venda.numero}:`, {
                        id: venda.id,
                        status: venda.status,
                        status_fiscal: venda.status_fiscal,
                        numero_nfce: venda.numero_nfce,
                        chave_acesso_nfce: venda.chave_acesso_nfce,
                        protocolo_nfce: venda.protocolo_nfce,
                        // Verificações individuais
                        'tem numero_nfce?': !!venda.numero_nfce,
                        'tem chave_acesso_nfce?': !!venda.chave_acesso_nfce,
                        'status_fiscal === EMITIDA_NFCE?': venda.status_fiscal === 'EMITIDA_NFCE',
                        temNotaFiscal: temNotaFiscal,
                        botaoQueDeveAparecer: temNotaFiscal ? 'IMPRIMIR' : 'GERAR'
                    });
                }
                
                // Acumular totais
                somaQuantidade += quantidadeTotal;
                somaValor += (venda.total || 0);
                
                // Badge de pagamento pendente
                let badgePagamento = '';
                if (venda.status === 'FINALIZADO' && (venda.pagamento_status === 'PENDENTE' || venda.pagamento_status === 'PARCIAL')) {
                    const icon = venda.pagamento_status === 'PARCIAL' ? 'fa-clock' : 'fa-exclamation-circle';

                        <span class="inline-flex items-center gap-1">

                            ${vendaFinalizada ? `<button onclick="abrirModalEditarPagamento('${venda.id}', '${venda.forma_pagamento || ''}', ${venda.subtotal || 0}, ${venda.desconto_valor || 0}, ${venda.total || 0})" class="text-blue-500 hover:text-blue-700 ml-1" title="Alterar forma de pagamento"><i class="fas fa-edit text-xs"></i></button>` : ''}

                    </td>
                    <td class="px-6 py-4 text-sm">
                        ${venda.chave_acesso_nfce ? `<span class="text-xs font-mono text-gray-600">${venda.chave_acesso_nfce.substring(3, 20)}...</span>` : '<span class="text-gray-400">-</span>'}

                    <td class="px-6 py-4 text-sm">
                        <div class="flex gap-2 flex-wrap">
                            <a href="/pages/venda-detalhe.html?id=${venda.id}" class="text-blue-600 hover:text-blue-800" title="Ver detalhes">
                                <i class="fas fa-eye"></i>

                            ${vendaFinalizada ? (

        // Gerar Nota Fiscal (NFC-e)
        async function gerarNotaFiscal(vendaId) {
            try {
                showLoading(true);
                
                // Buscar dados da venda
                const { data: venda, error: erroVenda } = await supabase
                    .from('vendas')
                    .select('*')
                    .eq('id', vendaId)
                    .single();

                if (erroVenda || !venda) {
                    console.error('Erro ao buscar venda:', erroVenda);
                    alert('Erro ao carregar dados da venda');
                    return;
                }
                
                // Verificar se já tem nota emitida
                if (venda.nfce_referencia || venda.status_fiscal === 'EMITIDA_NFCE') {
                    alert('Esta venda já possui nota fiscal emitida!\n\nUse o botão de imprimir para visualizar o DANFE.');
                    return;
                }

                // Buscar itens da venda
                const { data: itens, error: erroItens } = await supabase
                    .from('venda_itens')
                    .select('*')
                    .eq('venda_id', vendaId);

                if (erroItens) {
                    console.error('Erro ao buscar itens:', erroItens);
                    alert('Erro ao carregar itens da venda: ' + erroItens.message);
                    return;
                }
                
                if (!itens || itens.length === 0) {
                    alert('Esta venda não possui itens para emitir nota fiscal');
                    return;
                }
                
                // Buscar produtos para cada item separadamente
                for (let item of itens) {
                    if (item.produto_id) {
                        const { data: produto } = await supabase
                            .from('produtos')
                            .select('id, nome, codigo_barras, sku, ncm, cfop, cst_icms, aliquota_icms')
                            .eq('id', item.produto_id)
                            .single();
                        
                        item.produtos = produto;
                    }
                }


                // Usar forma_pagamento que já vem na venda (tabela pagamentos não precisa existir)
                const pagamentosParaNFe = [{
                    tipo: venda.forma_pagamento || 'DINHEIRO',
                    valor: venda.total
                }];

                // Buscar cliente (opcional)
                let cliente = null;
                if (venda.cliente_id) {
                    const { data: clienteData } = await supabase
                        .from('clientes')
                        .select('*')
                        .eq('id', venda.cliente_id)
                        .single();
                    cliente = clienteData;
                }

                console.log('📦 Venda:', venda);
                console.log('📋 Itens:', itens);
                console.log('💰 Pagamentos:', pagamentosParaNFe);
                console.log('📄 Dados fiscais atuais:', {
                    status_fiscal: venda.status_fiscal,
                    numero_nfce: venda.numero_nfce,
                    chave_acesso_nfce: venda.chave_acesso_nfce,
                    protocolo_nfce: venda.protocolo_nfce
                });

                // Emitir NFC-e via API Fiscal configurada (Focus NFe ou Nuvem Fiscal)
                const resultado = await FiscalService.emitirNFCeDireto(venda, itens, pagamentosParaNFe, cliente);

                console.log('📤 Resultado da emissão:', resultado);

                // Verificar sucesso
                if (resultado.success || resultado.status === 'autorizado') {
                    // Atualizar status da venda (incluindo nfce_id para consultas/impressão)
                    await supabase
                        .from('vendas')
                        .update({
                            status_fiscal: 'EMITIDA_NFCE',
                            numero_nfce: resultado.numero,
                            chave_acesso_nfce: resultado.chave_nfe || resultado.chave_acesso,
                            protocolo_nfce: resultado.protocolo,
                            nfce_id: resultado.nfce_id || null
                        })
                        .eq('id', vendaId);

                    // Inserir registro em documentos_fiscais para aparecer na listagem e permitir impressão
                    if (resultado.documentoFiscalData) {
                        const docFiscalParaSalvar = {
                            ...resultado.documentoFiscalData,
                            venda_id: vendaId
                        };
                        const { error: erroDocFiscal } = await supabase
                            .from('documentos_fiscais')
                            .insert(docFiscalParaSalvar);
                        if (erroDocFiscal) {
                            console.warn('⚠️ Aviso: não foi possível salvar em documentos_fiscais:', erroDocFiscal.message);
                        } else {
                            console.log('✅ Documento fiscal salvo em documentos_fiscais');
                        }
                    } else {
                        // Fallback: montar dados mínimos para documentos_fiscais mesmo sem documentoFiscalData
                        const { error: erroDocFiscal } = await supabase
                            .from('documentos_fiscais')
                            .insert({
                                venda_id: vendaId,
                                tipo_documento: 'NFCE',
                                numero_documento: String(resultado.numero || '0'),
                                serie: parseInt(resultado.serie || '1'),
                                chave_acesso: resultado.chave_nfe || resultado.chave_acesso,
                                protocolo_autorizacao: resultado.protocolo,
                                status_sefaz: '100',
                                mensagem_sefaz: 'Autorizado o uso da NFC-e',
                                valor_total: venda.total,
                                natureza_operacao: 'VENDA',
                                data_emissao: resultado.data_emissao || new Date().toISOString(),
                                data_autorizacao: resultado.data_autorizacao || new Date().toISOString(),
                                tentativas_emissao: 1,
                                ultima_tentativa: new Date().toISOString(),
                                api_provider: 'nuvem_fiscal',
                                nfce_id: resultado.nfce_id || null
                            });
                        if (erroDocFiscal) {
                            console.warn('⚠️ Aviso: não foi possível salvar em documentos_fiscais (fallback):', erroDocFiscal.message);
                        }
                    }

                    alert(`✅ NFC-e emitida com sucesso!

Número: ${resultado.numero}
Série: ${resultado.serie}
Chave: ${resultado.chave_nfe}
Protocolo: ${resultado.protocolo}

Deseja baixar o DANFE (PDF)?`);

                    // Baixar DANFE automaticamente
                    if (confirm('Baixar DANFE agora?')) {
                        if (resultado.caminho_danfe) {
                            window.open(resultado.caminho_danfe, '_blank');
                        }
                    }

                    // Recarregar lista
                    loadVendas();
                } else {
                    // Erro na emissão
                    const mensagem = resultado.mensagem_sefaz || resultado.mensagem || 'Erro desconhecido';
                    throw new Error('Rejeição: ' + mensagem);
                }

            } catch (error) {
                console.error('❌ Erro na emissão:', error);
                alert('❌ Erro na emissão: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        // Imprimir/Consultar nota fiscal existente
        async function imprimirNotaFiscal(vendaId, chaveAcesso) {
            try {
                showLoading(true);
                
                if (!chaveAcesso || chaveAcesso === 'undefined' || chaveAcesso === '') {
                    // Buscar chave de acesso do banco
                    const { data: venda } = await supabase
                        .from('vendas')
                        .select('chave_acesso_nfce, numero_nfce')
                        .eq('id', vendaId)
                        .single();
                    
                    chaveAcesso = venda?.chave_acesso_nfce;
                }
                
                if (!chaveAcesso) {
                    alert('Esta venda não possui chave de acesso da NFC-e');
                    return;
                }

                // ── Garantir registro em documentos_fiscais ────────────────────────
                const { data: docExistente } = await supabase
                    .from('documentos_fiscais')
                    .select('id')
                    .eq('chave_acesso', chaveAcesso)
                    .eq('tipo_documento', 'NFCE')
                    .maybeSingle();

                if (!docExistente) {
                    console.log('📝 Registro ausente em documentos_fiscais — inserindo...');
                    try {
                        // Buscar dados completos da venda para montar o registro
                        const { data: vendaCompleta, error: erroVendaCompleta } = await supabase
                            .from('vendas')
                            .select('id, total, numero_nfce, protocolo_nfce, nfce_id, status_fiscal, created_at')
                            .eq('id', vendaId)
                            .single();

                        if (erroVendaCompleta) {
                            console.warn('⚠️ Erro ao buscar venda completa:', erroVendaCompleta.message);
                        }

                        // Tentar obter dados extras da Nuvem Fiscal para datas/protocolo precisos
                        let nfceId = vendaCompleta?.nfce_id;
                        let dataEmissao = vendaCompleta?.created_at || new Date().toISOString();
                        let protocolo = vendaCompleta?.protocolo_nfce || null;
                        let numero = vendaCompleta?.numero_nfce || '0';
                        let serie = 1;

                        if (!nfceId) {
                            // Tentar recuperar nfce_id via API (mesmo fallback do fiscal.js)
                            try {
                                const { data: empConfig } = await supabase.from('empresa_config').select('cnpj, api_fiscal_provider').single();
                                if (empConfig?.api_fiscal_provider === 'nuvem_fiscal' && empConfig?.cnpj) {
                                    const cnpj = empConfig.cnpj.replace(/\D/g, '');
                                    const lista = await NuvemFiscal.listarNFCe(cnpj, NuvemFiscal.ambiente, 5);
                                    const notaEncontrada = lista?.data?.find(n => n.referencia === `VENDA-${vendaId}`);
                                    if (notaEncontrada?.id) {
                                        nfceId = notaEncontrada.id;
                                        numero = notaEncontrada.numero || numero;
                                        serie = parseInt(notaEncontrada.serie || serie);
                                        dataEmissao = notaEncontrada.data_emissao || dataEmissao;
                                        protocolo = notaEncontrada.autorizacao?.numero_protocolo || protocolo;
                                        // Persistir nfce_id na venda
                                        await supabase.from('vendas').update({ nfce_id: nfceId }).eq('id', vendaId);
                                    }
                                }
                            } catch (e) {
                                console.warn('⚠️ Não foi possível recuperar nfce_id via API:', e.message);
                            }
                        }

                        const { error: erroInsert } = await supabase
                            .from('documentos_fiscais')
                            .insert({
                                venda_id: vendaId,
                                tipo_documento: 'NFCE',
                                numero_documento: String(numero),
                                serie: serie,
                                chave_acesso: chaveAcesso,
                                protocolo_autorizacao: protocolo,
                                status_sefaz: '100',
                                mensagem_sefaz: 'Autorizado o uso da NFC-e',
                                valor_total: Number(vendaCompleta?.total) || null,
                                natureza_operacao: 'VENDA',
                                data_emissao: dataEmissao,
                                data_autorizacao: dataEmissao,
                                tentativas_emissao: 1,
                                ultima_tentativa: new Date().toISOString(),
                                api_provider: 'nuvem_fiscal',
                                nfce_id: nfceId || null
                            });

                        if (erroInsert) {
                            console.warn('⚠️ Falha ao inserir em documentos_fiscais:', erroInsert.message);
                        } else {
                            console.log('✅ Registro inserido com sucesso em documentos_fiscais');
                        }
                    } catch (erroSync) {
                        console.warn('⚠️ Erro ao sincronizar documentos_fiscais:', erroSync.message);
                    }
                } else {
                    console.log('✅ Registro já existe em documentos_fiscais:', docExistente.id);
                }
                // ──────────────────────────────────────────────────────────────────

                console.log('🔍 Consultando NFC-e com chave:', chaveAcesso);
                
                // Consultar nota usando a chave de acesso
                const resultado = await FiscalService.consultarDocumento(chaveAcesso, 'nfce');
                
                // Nuvem Fiscal usa método obterPDF() com autenticação
                if (resultado.caminho_danfe === 'USE_OBTER_PDF_METHOD' && resultado.obterPDF) {
                    const pdfUrl = await resultado.obterPDF();
                    window.open(pdfUrl, '_blank');
                    showToast('DANFE aberto em nova aba', 'success');
                } else if (resultado.caminho_danfe) {
                    window.open(resultado.caminho_danfe, '_blank');
                    showToast('DANFE aberto em nova aba', 'success');
                } else {
                    alert('Não foi possível obter o DANFE desta nota fiscal');
                }
            } catch (error) {
                console.error('❌ Erro ao consultar NFC-e:', error);
                alert('Erro ao consultar nota: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // ── Multi-select helpers ───────────────────────────────────────────────
        function toggleSelectAll(checked) {
            document.querySelectorAll('.venda-cb').forEach(cb => cb.checked = checked);
            atualizarSelecao();
        }

        function atualizarSelecao() {
            const cbs = document.querySelectorAll('.venda-cb');
            const selecionadas = document.querySelectorAll('.venda-cb:checked');
            document.getElementById('qtd-selecionadas').textContent = selecionadas.length;
            const barra = document.getElementById('barra-selecao');
            if (selecionadas.length > 0) {
                barra.classList.remove('hidden');
            } else {
                barra.classList.add('hidden');
            }
            // Atualizar estado do "select all"
            const selectAll = document.getElementById('select-all-cb');
            if (selectAll) {
                selectAll.checked = cbs.length > 0 && selecionadas.length === cbs.length;
                selectAll.indeterminate = selecionadas.length > 0 && selecionadas.length < cbs.length;
            }
        }

        function desselecionarTodas() {
            document.querySelectorAll('.venda-cb').forEach(cb => cb.checked = false);
            const selectAll = document.getElementById('select-all-cb');
            if (selectAll) { selectAll.checked = false; selectAll.indeterminate = false; }
            atualizarSelecao();
        }

        function getSelecionadas() {
            return Array.from(document.querySelectorAll('.venda-cb:checked')).map(cb => ({
                vendaId: cb.dataset.vendaId,
                chave: cb.dataset.chave
            })).filter(v => v.chave);
        }

        async function imprimirSelecionadas() {
            const selecionadas = getSelecionadas();
            if (selecionadas.length === 0) { showToast('Nenhuma nota selecionada', 'warning'); return; }
            showToast(`Abrindo ${selecionadas.length} nota(s)... Permita pop-ups no navegador.`, 'info');
            showLoading(true);
            let erros = 0;
            for (const { vendaId, chave } of selecionadas) {
                try {
                    const resultado = await FiscalService.consultarDocumento(chave, 'nfce');
                    if (resultado.caminho_danfe === 'USE_OBTER_PDF_METHOD' && resultado.obterPDF) {
                        const pdfUrl = await resultado.obterPDF();
                        window.open(pdfUrl, '_blank');
                    } else if (resultado.caminho_danfe) {
                        window.open(resultado.caminho_danfe, '_blank');
                    }
                    await new Promise(r => setTimeout(r, 600)); // pequeno delay entre janelas
                } catch (e) {
                    console.error('Erro ao imprimir nota', chave, e);
                    erros++;
                }
            }
            showLoading(false);
            if (erros > 0) showToast(`${erros} nota(s) com erro ao abrir`, 'warning');
            else showToast('✅ Todas as notas abertas!', 'success');
        }

        async function baixarXMLSelecionadas() {
            const selecionadas = getSelecionadas();
            if (selecionadas.length === 0) { showToast('Nenhuma nota selecionada', 'warning'); return; }
            showToast(`Baixando XML de ${selecionadas.length} nota(s)...`, 'info');
            showLoading(true);
            let erros = 0;
            for (const { vendaId, chave } of selecionadas) {
                try {
                    const xmlContent = await FiscalService.baixarXML(chave, 'nfce');
                    // xmlContent pode ser string XML ou Blob
                    let blob;
                    if (typeof xmlContent === 'string') {
                        blob = new Blob([xmlContent], { type: 'application/xml' });
                    } else if (xmlContent instanceof Blob) {
                        blob = xmlContent;
                    } else {
                        blob = new Blob([JSON.stringify(xmlContent)], { type: 'application/xml' });
                    }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `nfce-${chave}.xml`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    await new Promise(r => setTimeout(r, 400));
                } catch (e) {
                    console.error('Erro ao baixar XML', chave, e);
                    erros++;
                }
            }
            showLoading(false);
            if (erros > 0) showToast(`${erros} XML(s) com erro ao baixar`, 'warning');
            else showToast('✅ Todos os XMLs baixados!', 'success');
        }
        // ───────────────────────────────────────────────────────────────────────

        // Formatar forma de pagamento para exibição
        function formatarFormaPagamento(forma) {
            const mapa = {
                'DINHEIRO': '<span class="text-green-700">Dinheiro</span>',
                'PIX': '<span class="text-purple-700">PIX</span>',
                'CARTAO_DEBITO': '<span class="text-blue-700">Débito</span>',
                'CARTAO_CREDITO': '<span class="text-orange-700">Crédito</span>',
                'PRAZO': '<span class="text-gray-700">A Prazo</span>'
            };
            return mapa[forma] || forma || '-';
        }

        // Abrir modal para editar forma de pagamento
        function abrirModalEditarPagamento(vendaId, formaAtual, subtotal, descontoAtual, totalAtual) {
            console.log('🔵 Abrindo modal editar pagamento:', { vendaId, formaAtual, subtotal, descontoAtual, totalAtual });

            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
            overlay.id = 'modal-editar-pagamento-overlay';

            const container = document.createElement('div');
            container.className = 'bg-white p-6 rounded-lg max-w-md w-full mx-4';
            container.innerHTML = `
                <h3 class="text-xl font-bold mb-4"><i class="fas fa-exchange-alt mr-2 text-blue-600"></i>Alterar Forma de Pagamento</h3>
                <p class="text-gray-600 mb-2">Subtotal: <strong>R$ ${subtotal.toFixed(2)}</strong></p>
                <p class="text-gray-600 mb-4">Total atual: <strong>R$ ${totalAtual.toFixed(2)}</strong></p>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Nova Forma de Pagamento</label>
                    <select id="nova-forma-pagamento" class="w-full border rounded px-3 py-2">
                        <option value="DINHEIRO" ${formaAtual === 'DINHEIRO' ? 'selected' : ''}>Dinheiro</option>
                        <option value="PIX" ${formaAtual === 'PIX' ? 'selected' : ''}>PIX</option>
                        <option value="CARTAO_DEBITO" ${formaAtual === 'CARTAO_DEBITO' ? 'selected' : ''}>Cartão Débito</option>
                        <option value="CARTAO_CREDITO" ${formaAtual === 'CARTAO_CREDITO' ? 'selected' : ''}>Cartão Crédito</option>
                        <option value="PRAZO" ${formaAtual === 'PRAZO' ? 'selected' : ''}>A Prazo</option>
                    </select>
                </div>

                <div id="info-taxa-edicao" class="mb-4 hidden p-3 bg-yellow-50 rounded border border-yellow-200">
                    <p class="text-sm text-yellow-800"><i class="fas fa-info-circle mr-1"></i>Taxa do cartão: <strong id="taxa-info-edicao">0%</strong></p>
                    <p class="text-sm text-yellow-800">Desconto da taxa: <strong id="taxa-valor-edicao">R$ 0,00</strong></p>
                </div>

                <div class="mb-4 p-3 bg-blue-50 rounded border border-blue-200">
                    <p class="text-sm">Novo total: <strong id="novo-total-edicao" class="text-blue-700 text-lg">R$ ${totalAtual.toFixed(2)}</strong></p>
                </div>

                <div class="flex gap-2">
                    <button id="btn-cancelar-edicao" class="flex-1 px-4 py-2 border rounded hover:bg-gray-100">Cancelar</button>
                    <button id="btn-confirmar-edicao" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Salvar</button>
                </div>
            `;

            overlay.appendChild(container);
            document.body.appendChild(overlay);

            const selectForma = container.querySelector('#nova-forma-pagamento');
            const infoTaxa = container.querySelector('#info-taxa-edicao');
            const taxaInfo = container.querySelector('#taxa-info-edicao');
            const taxaValorEl = container.querySelector('#taxa-valor-edicao');
            const novoTotalEl = container.querySelector('#novo-total-edicao');
            const btnCancelar = container.querySelector('#btn-cancelar-edicao');
            const btnConfirmar = container.querySelector('#btn-confirmar-edicao');

            // Taxas padrão (TODO: buscar da empresa_config se disponível)
            const TAXA_DEBITO = 1.09;
            const TAXA_CREDITO = 3.16;

            let novoTotal = totalAtual;
            let novaTaxa = 0;

            const recalcularValores = () => {
                const forma = selectForma.value;
                let taxa = 0;

                if (forma === 'CARTAO_DEBITO') {
                    taxa = TAXA_DEBITO;
                } else if (forma === 'CARTAO_CREDITO') {
                    taxa = TAXA_CREDITO;
                }

                if (taxa > 0) {
                    novaTaxa = (subtotal * taxa) / 100;
                    novoTotal = subtotal - novaTaxa;
                    infoTaxa.classList.remove('hidden');
                    taxaInfo.textContent = `${taxa.toFixed(2)}%`;
                    taxaValorEl.textContent = `R$ ${novaTaxa.toFixed(2)}`;
                } else {
                    novaTaxa = 0;
                    novoTotal = subtotal;
                    infoTaxa.classList.add('hidden');
                }

                novoTotalEl.textContent = `R$ ${novoTotal.toFixed(2)}`;
            };

            selectForma.addEventListener('change', recalcularValores);
            recalcularValores(); // Calcular com valor atual

            btnCancelar.addEventListener('click', () => overlay.remove(), { once: true });

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.remove();
            });

            container.addEventListener('click', (e) => e.stopPropagation());

            btnConfirmar.addEventListener('click', async () => {
                const novaForma = selectForma.value;

                if (novaForma === formaAtual && Math.abs(novoTotal - totalAtual) < 0.01) {
                    overlay.remove();
                    return;
                }

                btnConfirmar.disabled = true;
                btnConfirmar.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Salvando...';

                try {
                    const { error } = await supabase
                        .from('vendas')
                        .update({
                            forma_pagamento: novaForma,
                            desconto_valor: novaTaxa,
                            total: novoTotal,
                            valor_pago: novoTotal
                        })
                        .eq('id', vendaId);

                    if (error) throw error;

                    console.log(`✅ Pagamento atualizado: ${formaAtual} -> ${novaForma}, Total: R$ ${novoTotal.toFixed(2)}`);
                    overlay.remove();
                    showToast('Forma de pagamento atualizada!', 'success');
                    await loadVendas();
                } catch (error) {
                    console.error('❌ Erro ao atualizar pagamento:', error);
                    alert('Erro ao atualizar: ' + error.message);
                    btnConfirmar.disabled = false;
                    btnConfirmar.innerHTML = 'Salvar';
                }
            }, { once: true });
        }

        // Cancelar NFC-e
        async function cancelarNotaFiscal(vendaId, chaveAcesso) {
            try {
                // Buscar dados da venda
                const { data: venda, error: vendaError } = await supabase
                    .from('vendas')
                    .select('chave_acesso_nfce, numero_nfce, data_venda, status_fiscal')
                    .eq('id', vendaId)
                    .single();

                if (vendaError) throw vendaError;
                if (!venda.chave_acesso_nfce) {
                    alert('Esta venda não possui nota fiscal emitida');
                    return;
                }

                // Verificar prazo de cancelamento (30 minutos para NFC-e)
                const dataEmissao = new Date(venda.data_venda);
                const agora = new Date();
                const diferencaMinutos = (agora - dataEmissao) / 1000 / 60;

                if (diferencaMinutos > 30) {
                    alert(`⚠️ Prazo para cancelamento expirado!\n\nNFC-e pode ser cancelada em até 30 minutos após a emissão.\nTempo decorrido: ${Math.round(diferencaMinutos)} minutos`);
                    return;
                }

                // Solicitar justificativa
                const justificativa = prompt('📝 Informe a justificativa do cancelamento:\n\n(mínimo 15 caracteres)');
                
                if (!justificativa) return;
                
                if (justificativa.length < 15) {
                    alert('A justificativa deve ter no mínimo 15 caracteres');
                    return;
                }

                if (!confirm(`⚠️ Confirma o cancelamento da NFC-e?\n\nNúmero: ${venda.numero_nfce}\nJustificativa: ${justificativa}`)) {
                    return;
                }

                showLoading(true);

                // Cancelar via API Fiscal configurada
                const resultado = await FiscalService.cancelarDocumento(chaveAcesso, justificativa, 'nfce');

                if (resultado.status === 'cancelado') {
                    // Atualizar status no banco
                    await supabase
                        .from('vendas')
                        .update({
                            status_fiscal: 'CANCELADA'
                        })
                        .eq('id', vendaId);

                    // Cancelar a venda também
                    try {
                        console.log('🔗 Cancelando venda associada:', vendaId);
                        const resultadoCancelamentoVenda = await FiscalService.cancelarVendaAssociada(vendaId);
                        console.log('✅ Venda cancelada:', resultadoCancelamentoVenda);
                    } catch (erroCancelamento) {
                        console.warn('⚠️ Erro ao cancelar venda:', erroCancelamento.message);
                        showToast('⚠️ Nota cancelada mas erro ao cancelar venda: ' + erroCancelamento.message, 'warning');
                    }

                    alert('✅ NFC-e cancelada com sucesso!');
                    loadVendas(); // Recarregar lista
                } else {
                    throw new Error('Erro ao cancelar nota: ' + (resultado.mensagem_sefaz || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error('❌ Erro ao cancelar NFC-e:', error);
                alert('Erro ao cancelar nota: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
    </script>
